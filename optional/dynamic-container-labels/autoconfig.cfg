// Zen Browser AutoConfig: inject container names onto tab nodes for userChrome.css.
(() => {
  if (globalThis.__zenContainerLabelBridgeLoaded) {
    return;
  }
  globalThis.__zenContainerLabelBridgeLoaded = true;

  const { Services } = ChromeUtils.importESModule(
    "resource://gre/modules/Services.sys.mjs"
  );
  const { ContextualIdentityService } = ChromeUtils.importESModule(
    "resource://gre/modules/ContextualIdentityService.sys.mjs"
  );

  const WINDOW_STATE_KEY = "__zenContainerLabelBridgeState";

  function getBrowserWindows() {
    const windows = [];
    const enumerator = Services.wm.getEnumerator("navigator:browser");
    while (enumerator.hasMoreElements()) {
      windows.push(enumerator.getNext());
    }
    return windows;
  }

  function getContainerLabel(tab) {
    if (!tab?.hasAttribute("usercontextid")) {
      return "";
    }

    try {
      return ContextualIdentityService.getUserContextLabel(
        tab.getAttribute("usercontextid")
      );
    } catch (error) {
      Services.console.logStringMessage(
        `[zen-container-label-bridge] ${error}`
      );
      return "";
    }
  }

  function syncTab(tab) {
    if (!tab?.isConnected) {
      return;
    }

    const label = getContainerLabel(tab);
    const targets = [
      tab,
      tab.querySelector(".tab-label-container"),
      tab.querySelector(".tab-content"),
    ];

    for (const target of targets) {
      if (!target) {
        continue;
      }

      if (label) {
        target.setAttribute("data-identity-name", label);
      } else {
        target.removeAttribute("data-identity-name");
      }
    }
  }

  function syncWindow(win) {
    if (!win?.gBrowser?.tabs) {
      return;
    }

    for (const tab of win.gBrowser.tabs) {
      syncTab(tab);
    }
  }

  function detachWindow(win) {
    const state = win?.[WINDOW_STATE_KEY];
    const tabContainer = win?.gBrowser?.tabContainer;
    if (!state || !tabContainer) {
      return;
    }

    tabContainer.removeEventListener("TabOpen", state.onTabOpen);
    tabContainer.removeEventListener("TabAttrModified", state.onTabAttrModified);
    tabContainer.removeEventListener("TabPinned", state.onTabPinned);
    tabContainer.removeEventListener("TabUnpinned", state.onTabUnpinned);
    win.removeEventListener("unload", state.onUnload);
    delete win[WINDOW_STATE_KEY];
  }

  function attachWindow(win) {
    if (!win?.gBrowser?.tabContainer || win[WINDOW_STATE_KEY]) {
      return;
    }

    const tabContainer = win.gBrowser.tabContainer;

    const onTabOpen = event => {
      win.setTimeout(() => syncTab(event.target), 0);
    };
    const onTabAttrModified = event => {
      const changed = event.detail?.changed ?? [];
      if (
        changed.includes("usercontextid") ||
        changed.includes("pinned") ||
        changed.includes("hidden")
      ) {
        syncTab(event.target);
      }
    };
    const onTabPinned = event => syncTab(event.target);
    const onTabUnpinned = event => syncTab(event.target);
    const onUnload = () => detachWindow(win);

    tabContainer.addEventListener("TabOpen", onTabOpen);
    tabContainer.addEventListener("TabAttrModified", onTabAttrModified);
    tabContainer.addEventListener("TabPinned", onTabPinned);
    tabContainer.addEventListener("TabUnpinned", onTabUnpinned);
    win.addEventListener("unload", onUnload);

    win[WINDOW_STATE_KEY] = {
      onTabOpen,
      onTabAttrModified,
      onTabPinned,
      onTabUnpinned,
      onUnload,
    };

    syncWindow(win);
  }

  const observer = {
    observe(subject, topic) {
      if (topic === "browser-delayed-startup-finished") {
        attachWindow(subject);
        return;
      }

      if (
        topic === "contextual-identity-created" ||
        topic === "contextual-identity-updated" ||
        topic === "contextual-identity-deleted"
      ) {
        for (const win of getBrowserWindows()) {
          syncWindow(win);
        }
      }
    },
  };

  Services.obs.addObserver(observer, "browser-delayed-startup-finished");
  Services.obs.addObserver(observer, "contextual-identity-created");
  Services.obs.addObserver(observer, "contextual-identity-updated");
  Services.obs.addObserver(observer, "contextual-identity-deleted");

  for (const win of getBrowserWindows()) {
    if (win.gBrowserInit?.delayedStartupFinished) {
      attachWindow(win);
    }
  }
})();
